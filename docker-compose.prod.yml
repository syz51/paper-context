services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      PAPER_CONTEXT_ENVIRONMENT: production
      PAPER_CONTEXT_DATABASE__APPLICATION_NAME: paper-context-app
      PAPER_CONTEXT_STORAGE__ROOT_PATH: /var/lib/paper-context/artifacts
    depends_on:
      migrate:
        condition: service_completed_successfully
    networks:
      - dokploy-network
    restart: unless-stopped
    # Keep production app startup pinned behind migrations so the API only comes up on a migrated schema.
    command:
      - python
      - -m
      - paper_context.cli
      - serve
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request; urllib.request.urlopen("http://127.0.0.1:8000/healthz", timeout=2)
      interval: 10s
      timeout: 5s
      retries: 10
    ports:
      - "8000:8000"
    volumes:
      - paper_context_artifacts:/var/lib/paper-context/artifacts

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      PAPER_CONTEXT_ENVIRONMENT: production
      PAPER_CONTEXT_DATABASE__APPLICATION_NAME: paper-context-worker
      PAPER_CONTEXT_STORAGE__ROOT_PATH: /var/lib/paper-context/artifacts
    depends_on:
      app:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks:
      - dokploy-network
    restart: unless-stopped
    command:
      - python
      - -m
      - paper_context.cli
      - worker
    volumes:
      - paper_context_artifacts:/var/lib/paper-context/artifacts

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      PAPER_CONTEXT_ENVIRONMENT: production
      PAPER_CONTEXT_DATABASE__APPLICATION_NAME: paper-context-migrate
    networks:
      - dokploy-network
    # Migrations are a one-shot bootstrap step and should complete before app or worker.
    command:
      - alembic
      - upgrade
      - head

networks:
  dokploy-network:
    external: true

volumes:
  paper_context_artifacts:
